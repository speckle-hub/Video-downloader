name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config ccache

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          cd android_app
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-APK
          path: android_app/bin/*.apk
          if-no-files-found: error

      - name: Get APK name
        id: apk
        run: |
          APK_PATH=$(ls android_app/bin/*.apk | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android_app/bin/*.apk
