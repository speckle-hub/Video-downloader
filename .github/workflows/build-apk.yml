name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config ccache

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          cd android_app
          rm -rf .buildozer
          buildozer android debug 2>&1 | tee buildozer_full.log
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Find and upload APK
        run: |
          echo "Searching for APK..."
          find android_app -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          find android_app -name "*.apk" -type f -exec cp {} android_app/ \; 2>/dev/null || true
          ls -la android_app/*.apk 2>/dev/null || echo "No APK in android_app/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-APK
          path: |
            android_app/*.apk
            android_app/bin/*.apk
            android_app/.buildozer/android/platform/**/*.apk
          if-no-files-found: warn

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-full-log
          path: android_app/buildozer_full.log
          if-no-files-found: ignore
