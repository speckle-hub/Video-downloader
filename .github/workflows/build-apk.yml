name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-dev build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config ccache

      - name: Cache Buildozer SDK/NDK
        id: cache-buildozer
        uses: actions/cache@v4
        with:
          path: android_app/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android_app/buildozer.spec') }}

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          cd android_app
          # Let Buildozer download its own SDK (GitHub's pre-installed one is incomplete)
          unset ANDROID_HOME ANDROID_SDK_ROOT ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK ANDROID_SDK_HOME
          buildozer android debug 2>&1 | tee buildozer_full.log
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Find and upload APK
        run: |
          echo "=== Searching for APK ==="
          find android_app -name "*.apk" -type f 2>/dev/null
          APK=$(find android_app -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "Found APK at: $APK"
            cp "$APK" android_app/
            ls -la android_app/*.apk
          else
            echo "No APK found. Checking last 50 lines of log..."
            tail -50 android_app/buildozer_full.log 2>/dev/null || echo "No log available"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: VideoDownloader-APK
          path: |
            android_app/bin/*.apk
            android_app/*.apk
          if-no-files-found: warn

      - name: Show last part of log
        if: always()
        run: |
          echo "=== Build log (last 80 lines) ==="
          tail -80 android_app/buildozer_full.log 2>/dev/null || echo "No log available"

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Buildozer-full-log
          path: android_app/buildozer_full.log
          if-no-files-found: ignore
